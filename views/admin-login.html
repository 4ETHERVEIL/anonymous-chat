<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NGL Clone</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body style="display: flex; align-items: center; min-height: 100vh;">
    <div class="container">
        <div class="card" style="max-width: 400px; margin: 0 auto;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="color: #667eea;">🔐 Admin Login</h2>
                <p style="color: #666;">Masuk ke dashboard admin</p>
            </div>
            
            {{error}}
            
            <form method="POST" action="/admin/login">
                <div class="form-group">
                    <input type="text" name="username" placeholder="Username" required autofocus>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit">Login</button>
            </form>
            
            <div style="text-align: center; margin-top: 20px; color: #999; font-size: 0.9rem;">
                <p>Default: admin / admin123</p>
            </div>
        </div>
    </div>
</body>
</html>
