<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL Clone - Kirim Pesan Anonymous</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="nav-bar">
        <div class="nav-content">
            <h2>📱 NGL Clone</h2>
            <div class="nav-links">
                <span style="color: #666;">Anonymous Chat</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h3>🔗 Link Anonymous Kamu</h3>
            <div class="link-info" id="userLink">
                https://anonymous-chat-omega.vercel.app/?user={{userId}}
            </div>
            <p style="text-align: center; margin-top: 15px; color: #666; font-size: 0.9rem;">
                Bagikan link ini ke teman-temanmu untuk menerima pesan anonymous
            </p>
        </div>
        
        <div class="card">
            <h3>📝 Kirim Pesan Anonymous</h3>
            <p style="color: #666; margin-bottom: 20px;">Pesanmu akan tetap rahasia. Admin akan membalas jika ada pesan masuk.</p>
            
            <div class="form-group">
                <textarea id="messageInput" rows="4" placeholder="Ketik pesanmu di sini..."></textarea>
            </div>
            
            <button onclick="sendMessage()" id="sendBtn">Kirim Pesan</button>
        </div>
        
        <div class="card">
            <h3>💬 Pesan Masuk</h3>
            <div id="messagesContainer" class="messages-container">
                {{messages}}
            </div>
        </div>
    </div>

    <script>
        const sendBtn = document.getElementById('sendBtn');
        const messageInput = document.getElementById('messageInput');
        const messagesContainer = document.getElementById('messagesContainer');
        const userLink = document.getElementById('userLink');

        // Update link dengan domain saat ini secara dinamis
        document.addEventListener('DOMContentLoaded', function() {
            const currentDomain = window.location.origin;
            const userId = '{{userId}}';
            if (userLink && userId) {
                userLink.textContent = currentDomain + '/?user=' + userId;
            }
        });

        async function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message) {
                alert('Pesan tidak boleh kosong!');
                return;
            }
            
            sendBtn.disabled = true;
            sendBtn.textContent = 'Mengirim...';
            sendBtn.classList.add('loading');
            
            try {
                const response = await fetch('/send-message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                });
                
                if (response.ok) {
                    messageInput.value = '';
                    loadMessages();
                    showNotification('Pesan terkirim!', 'success');
                } else {
                    showNotification('Gagal mengirim pesan', 'error');
                }
            } catch (error) {
                showNotification('Error: ' + error.message, 'error');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Kirim Pesan';
                sendBtn.classList.remove('loading');
            }
        }
        
        async function loadMessages() {
            try {
                const response = await fetch('/api/messages');
                const data = await response.json();
                
                if (data.messages && data.messages.length > 0) {
                    messagesContainer.innerHTML = data.messages.map(msg => {
                        const date = new Date(msg.created_at);
                        const timeStr = date.toLocaleString('id-ID', {
                            day: 'numeric',
                            month: 'short',
                            hour: '2-digit',
                            minute: '2-digit'
                        });
                        
                        return `
                            <div class="message-bubble ${msg.is_admin_reply ? 'admin-message' : 'user-message'}">
                                <div>${msg.message}</div>
                                <div class="message-time">${timeStr}</div>
                            </div>
                        `;
                    }).join('');
                    
                    // Auto scroll ke bawah
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                } else {
                    messagesContainer.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">Belum ada pesan. Kirim pesan pertama!</p>';
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }
        
        // Fungsi notifikasi sederhana
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 25px;
                background: ${type === 'success' ? '#4caf50' : '#f44336'};
                color: white;
                border-radius: 50px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
        
        // Auto refresh setiap 3 detik
        setInterval(loadMessages, 3000);
        
        // Load pesan pertama kali
        loadMessages();
        
        // Kirim dengan Enter (Shift+Enter untuk new line)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Tambahkan style untuk animasi notifikasi
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
