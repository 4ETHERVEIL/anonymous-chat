<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL Clone - Tanya Apa Saja, Anonim</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .error-box {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📱 NGL</h1>
        <a href="/admin/login">Admin</a>
    </div>

    <div class="container">
        <div style="text-align: center; margin: 30px 0;">
            <span class="play-badge">PLAY</span>
            <span class="play-badge inbox">INBOX</span>
        </div>

        <h1 style="text-align: center; margin-bottom: 20px;">tanya apa aja, anonim</h1>

        <div class="card">
            <div class="steps">
                <div class="step">
                    <div class="step-number">1</div>
                    <div>Buat link kamu</div>
                </div>
                <div class="step">
                    <div class="step-number">2</div>
                    <div>Share ke story Instagram</div>
                </div>
                <div class="step">
                    <div class="step-number">3</div>
                    <div>Terima pertanyaan anonymous</div>
                </div>
            </div>

            <div id="errorDisplay" class="error-box"></div>

            <div class="form-group">
                <input type="text" id="username" placeholder="Username kamu (contoh: zycho1_)" style="text-align: center;">
            </div>

            <button onclick="register()" id="registerBtn">Buat Link!</button>

            <div id="result" style="margin-top: 20px; display: none;">
                <div class="link-box">
                    <span id="linkText">https://anonymous-chat-omega.vercel.app/ask/</span>
                    <button onclick="copyLink()">copy link</button>
                </div>

                <div class="share-options">
                    <div class="share-option instagram" onclick="shareIG()">
                        📸 Share ke Story
                    </div>
                    <div class="share-option whatsapp" onclick="shareWA()">
                        📱 WhatsApp
                    </div>
                </div>
            </div>

            <div style="margin-top: 30px; color: #666; font-size: 0.9rem; text-align: center;">
                <p>✨ 228 kawan baru je tekan butang</p>
                <p>Dapatkan pesan untuk dirimu sendiri!</p>
            </div>
        </div>

        <div class="footer">
            <a href="#">Terms</a> • <a href="#">Privacy</a>
        </div>
    </div>

    <script>
        let currentUsername = '';

        async function register() {
            const username = document.getElementById('username').value.trim();
            const errorBox = document.getElementById('errorDisplay');
            const btn = document.getElementById('registerBtn');
            
            // Reset error
            errorBox.style.display = 'none';
            
            if (!username) {
                showError('Masukkan username dulu!');
                return;
            }

            if (username.length < 3) {
                showError('Username minimal 3 karakter');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Memproses...';

            try {
                console.log('Mengirim request untuk username:', username);
                
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username })
                });

                const data = await response.json();
                console.log('Response:', data);
                
                if (data.success) {
                    currentUsername = data.username;
                    document.getElementById('linkText').textContent = `https://anonymous-chat-omega.vercel.app/ask/${data.username}`;
                    document.getElementById('result').style.display = 'block';
                    
                    // Redirect ke inbox setelah 2 detik
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 2000);
                } else {
                    showError(data.error || 'Terjadi kesalahan');
                    btn.disabled = false;
                    btn.textContent = 'Buat Link!';
                }
            } catch (error) {
                console.error('Error detail:', error);
                showError('Gagal koneksi ke server. Cek koneksi internet Anda.');
                btn.disabled = false;
                btn.textContent = 'Buat Link!';
            }
        }

        function showError(message) {
            const errorBox = document.getElementById('errorDisplay');
            errorBox.textContent = message;
            errorBox.style.display = 'block';
            
            // Auto hide setelah 5 detik
            setTimeout(() => {
                errorBox.style.display = 'none';
            }, 5000);
        }

        function copyLink() {
            const link = `https://anonymous-chat-omega.vercel.app/ask/${currentUsername}`;
            navigator.clipboard.writeText(link).then(() => {
                alert('Link copied!');
            }).catch(() => {
                alert('Gagal copy link');
            });
        }

        function shareIG() {
            const link = `https://anonymous-chat-omega.vercel.app/ask/${currentUsername}`;
            window.open(`https://www.instagram.com/create/story/?link=${encodeURIComponent(link)}`);
        }

        function shareWA() {
            const link = `https://anonymous-chat-omega.vercel.app/ask/${currentUsername}`;
            const text = `Tanya apa aja, anonim! ${link}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
        }

        // Test koneksi saat halaman dimuat
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('/api/test');
                const data = await response.json();
                console.log('Connection test:', data);
                
                if (data.status === 'ERROR') {
                    showError('Koneksi database bermasalah. Admin akan segera memperbaiki.');
                }
            } catch (error) {
                console.error('Test connection failed:', error);
            }
        });
    </script>
</body>
</html>
