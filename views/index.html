<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL Clone - Tanya Apa Saja, Anonim</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header">
        <h1>📱 NGL</h1>
        <a href="/admin/login">Admin</a>
    </div>

    <div class="container">
        <div style="text-align: center; margin: 30px 0;">
            <span class="play-badge">PLAY</span>
            <span class="play-badge inbox">INBOX</span>
        </div>

        <h1 style="text-align: center; margin-bottom: 20px;">tanya apa aja, anonim</h1>

        <div class="card">
            <div class="steps">
                <div class="step">
                    <div class="step-number">1</div>
                    <div>Buat link kamu</div>
                </div>
                <div class="step">
                    <div class="step-number">2</div>
                    <div>Share ke story Instagram</div>
                </div>
                <div class="step">
                    <div class="step-number">3</div>
                    <div>Terima pertanyaan anonymous</div>
                </div>
            </div>

            <div class="form-group">
                <input type="text" id="username" placeholder="Username kamu (contoh: zycho1_)" style="text-align: center;">
            </div>

            <button onclick="register()" id="registerBtn">Buat Link!</button>

            <div id="result" style="margin-top: 20px; display: none;">
                <div class="link-box">
                    <span id="linkText">anonymous-chat-omega.vercel.app/ask/</span>
                    <button onclick="copyLink()">copy link</button>
                </div>

                <div class="share-options">
                    <div class="share-option instagram" onclick="shareIG()">
                        📸 Share ke Story
                    </div>
                    <div class="share-option whatsapp" onclick="shareWA()">
                        📱 WhatsApp
                    </div>
                </div>
            </div>

            <div style="margin-top: 30px; color: #666; font-size: 0.9rem; text-align: center;">
                <p>✨ 228 kawan baru je tekan butang</p>
                <p>Dapatkan pesan untuk dirimu sendiri!</p>
            </div>
        </div>

        <div class="footer">
            <a href="#">Terms</a> • <a href="#">Privacy</a>
        </div>
    </div>

    <script>
        let currentUsername = '';
        const BASE_URL = '{{BASE_URL}}';

        async function register() {
            const username = document.getElementById('username').value.trim();
            if (!username) {
                alert('Masukkan username dulu!');
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = 'Memproses...';

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username })
                });

                const data = await response.json();
                
                if (data.success) {
                    currentUsername = data.username;
                    document.getElementById('linkText').textContent = `${BASE_URL}/ask/${data.username}`;
                    document.getElementById('result').style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 2000);
                } else {
                    alert(data.error);
                }
            } catch (error) {
                alert('Gagal. Coba lagi.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Buat Link!';
            }
        }

        function copyLink() {
            const link = `${BASE_URL}/ask/${currentUsername}`;
            navigator.clipboard.writeText(link);
            alert('Link copied!');
        }

        function shareIG() {
            const link = `${BASE_URL}/ask/${currentUsername}`;
            window.open(`https://www.instagram.com/create/story/?link=${encodeURIComponent(link)}`);
        }

        function shareWA() {
            const link = `${BASE_URL}/ask/${currentUsername}`;
            const text = `Tanya apa aja, anonim! ${link}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
        }
    </script>
</body>
</html>
