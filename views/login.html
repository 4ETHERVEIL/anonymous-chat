<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL Clone - Login</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo">📱</div>
            <h1 style="margin-bottom: 10px;">NGL Clone</h1>
            <p style="color: white; margin-bottom: 30px;">Anonymous Messaging</p>
            
            <div class="login-card">
                <h2 style="margin-bottom: 20px;">Masuk dengan Username</h2>
                
                <div style="background: #f0f0f0; padding: 10px; border-radius: 10px; margin-bottom: 20px;">
                    🔸 Seperti NGL asli - cukup masukkan username!
                </div>
                
                <div id="errorMsg" class="error" style="display: none;"></div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <input type="text" id="username" placeholder="Username kamu" required>
                    </div>
                    <button type="submit" id="loginBtn">Mulai Chat</button>
                </form>
                
                <div style="display: flex; justify-content: space-around; margin-top: 30px;">
                    <div>🔒 <br><small>Anonymous</small></div>
                    <div>⚡ <br><small>Real-time</small></div>
                    <div>⭐ <br><small>Pro</small></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const username = document.getElementById('username');
        const btn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const user = username.value.trim();
            if (!user) {
                showError('Username wajib diisi');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Memproses...';

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user })
                });

                if (res.redirected) {
                    window.location.href = res.url;
                } else {
                    const data = await res.json();
                    showError(data.error || 'Gagal login');
                    btn.disabled = false;
                    btn.textContent = 'Mulai Chat';
                }
            } catch (err) {
                showError('Koneksi error');
                btn.disabled = false;
                btn.textContent = 'Mulai Chat';
            }
        });

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
