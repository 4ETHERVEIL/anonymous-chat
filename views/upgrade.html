<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL Pro - Upgrade</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="nav-bar">
        <div class="nav-content">
            <h2>⭐ NGL Pro</h2>
            <a href="/chat/{{sessionId}}" style="color: #667eea;">← Kembali</a>
        </div>
    </div>

    <div class="container">
        <div class="card" style="max-width: 400px; margin:0 auto; text-align:center;">
            <h1 style="color: gold; font-size: 3rem;">⭐</h1>
            <h2>NGL Pro</h2>
            <p style="font-size: 2rem; margin:20px 0;">$9.99 <small style="font-size:1rem;">/bulan</small></p>
            
            <ul style="list-style: none; text-align: left; margin: 30px 0;">
                <li>✅ Lihat lokasi pengirim</li>
                <li>✅ Lihat device pengirim</li>
                <li>✅ 30% lebih banyak pesan</li>
                <li>✅ Prioritas support</li>
            </ul>

            <form method="POST" action="/upgrade">
                <button type="submit">Upgrade Sekarang</button>
            </form>
            
            <p style="margin-top:20px; color:#666;">💯 Garansi 7 hari</p>
        </div>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', (e) => {
            if (!confirm('Lanjutkan pembayaran? (Demo mode)')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
