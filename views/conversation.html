<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Percakapan</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="nav-bar">
        <div class="nav-content">
            <h2>💬 Detail</h2>
            <a href="/admin" style="color:#667eea;">← Kembali</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div id="messages" class="messages-container">
                {{messages}}
            </div>
        </div>

        <div class="card">
            <form method="POST" action="/admin/reply/{{conversationId}}">
                <div class="form-group">
                    <textarea name="message" rows="3" placeholder="Balasan..." required></textarea>
                </div>
                <button type="submit">Kirim Balasan</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('messages').scrollTop = 9999;
        setTimeout(() => location.reload(), 5000);
    </script>
</body>
</html>
