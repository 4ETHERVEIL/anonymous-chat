<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Percakapan - NGL Clone</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="nav-bar">
        <div class="nav-content">
            <h2>💬 Detail Percakapan</h2>
            <div class="nav-links">
                <a href="/admin" class="back-btn">← Kembali</a>
                <form method="POST" action="/admin/logout" style="display: inline;">
                    <button type="submit" class="btn-danger" style="padding: 8px 16px; width: auto;">Logout</button>
                </form>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h3>Session ID:</h3>
            <p style="word-break: break-all; background: #f0f2f5; padding: 10px; border-radius: 8px;">{{sessionId}}</p>
            <p><strong>Dimulai:</strong> {{createdAt}}</p>
        </div>
        
        <div class="card">
            <h3>Riwayat Pesan</h3>
            <div id="messagesContainer" class="messages-container">
                {{messages}}
            </div>
        </div>
        
        <div class="card">
            <h3>✏️ Balas Pesan</h3>
            <form method="POST" action="/admin/reply/{{conversationId}}">
                <div class="form-group">
                    <textarea name="message" rows="4" placeholder="Ketik balasanmu di sini..." required></textarea>
                </div>
                <button type="submit">Kirim Balasan</button>
            </form>
        </div>
    </div>

    <script>
        // Auto scroll ke bawah
        const container = document.getElementById('messagesContainer');
        container.scrollTop = container.scrollHeight;
    </script>
</body>
</html>
