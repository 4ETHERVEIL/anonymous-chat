<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL Clone - Chat</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .header-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .pro-badge {
            background: gold;
            color: #333;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .upgrade-link {
            background: gold;
            color: #333;
            padding: 5px 15px;
            border-radius: 20px;
            text-decoration: none;
        }
        .share-box {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .share-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }
        .share-box button {
            width: auto;
            padding: 12px 25px;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-content">
            <h2>📱 NGL</h2>
            <div class="header-info">
                <span>@{{username}}</span>
                <span class="pro-badge">{{isPro}}</span>
                <a href="/upgrade" class="upgrade-link">✨ Upgrade</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h3>🔗 Link Anonymous Kamu</h3>
            <div class="share-box">
                <input type="text" id="linkInput" value="https://anonymous-chat-omega.vercel.app/chat/{{sessionId}}" readonly>
                <button onclick="copyLink()">Copy</button>
            </div>
        </div>

        <div class="card">
            <h3>📝 Kirim Pesan</h3>
            <div class="form-group">
                <textarea id="messageInput" rows="3" placeholder="Ketik pesan..."></textarea>
            </div>
            <button onclick="sendMessage()" id="sendBtn">Kirim</button>
        </div>

        <div class="card">
            <h3>💬 Pesan Masuk</h3>
            <div id="messages" class="messages-container">
                {{messages}}
            </div>
        </div>
    </div>

    <script>
        const sessionId = '{{sessionId}}';
        const msgContainer = document.getElementById('messages');
        const msgInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        function copyLink() {
            const link = document.getElementById('linkInput');
            link.select();
            document.execCommand('copy');
            alert('Link copied!');
        }

        async function sendMessage() {
            const message = msgInput.value.trim();
            if (!message) return alert('Pesan tidak boleh kosong');

            sendBtn.disabled = true;
            sendBtn.textContent = 'Mengirim...';

            try {
                await fetch('/send-message', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message, sessionId })
                });
                msgInput.value = '';
                loadMessages();
            } catch (error) {
                alert('Gagal mengirim');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Kirim';
            }
        }

        async function loadMessages() {
            try {
                const res = await fetch(`/api/messages?sessionId=${sessionId}`);
                const data = await res.json();
                
                if (data.messages?.length) {
                    msgContainer.innerHTML = data.messages.map(m => {
                        const date = new Date(m.created_at).toLocaleString();
                        const isPro = '{{isPro}}' === 'Pro';
                        let hint = '';
                        
                        if (isPro && !m.is_admin_reply && m.sender_location) {
                            hint = `<small style="display:block; margin-top:5px;">📍 ${m.sender_location}</small>`;
                        }
                        
                        return `
                            <div class="message-bubble ${m.is_admin_reply ? 'admin-message' : 'user-message'}">
                                <div>${m.message}</div>
                                <div class="message-time">${date}</div>
                                ${hint}
                            </div>
                        `;
                    }).join('');
                    msgContainer.scrollTop = msgContainer.scrollHeight;
                }
            } catch (error) {}
        }

        setInterval(loadMessages, 3000);
        loadMessages();

        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
